<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d0f1a">
  <title>Quiz – Elektriker-app</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f1a;
      --surface: #161927;
      --surface2: #1e2235;
      --border: #2a2f4a;
      --text: #e8eaf6;
      --muted: #7b82a8;
      --accent: #5c7cfa;
      --accent-hover: #4a6cf7;
      --green: #2ecc71;
      --green-bg: rgba(46,204,113,0.12);
      --red: #e74c3c;
      --red-bg: rgba(231,76,60,0.12);
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px 16px 56px;
    }

    /* ── Top bar ── */
    .topbar {
      width: 100%;
      max-width: 700px;
      display: flex;
      align-items: center;
      margin-bottom: 24px;
      padding-top: 4px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 14px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .back-btn .arrow { color: var(--accent); }
    .back-btn:active { background: var(--surface2); border-color: var(--accent); }
    .topbar-title {
      flex: 1;
      text-align: center;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      margin-right: 48px;
    }

    /* ── Progress ── */
    .progress-wrap { width: 100%; max-width: 700px; margin-bottom: 20px; }
    .progress-meta { display: flex; justify-content: space-between; font-size: 0.82rem; color: var(--muted); margin-bottom: 8px; }
    .progress-bar-bg { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #818cf8); border-radius: 99px; transition: width 0.4s ease; width: 0%; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 28px 24px;
      max-width: 700px;
      width: 100%;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Category badge ── */
    .cat-badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 99px;
      margin-bottom: 14px;
      background: rgba(255,255,255,0.08);
    }

    /* ── Question image ── */
    .q-image {
      margin-bottom: 16px;
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface2);
    }
    .q-image svg { width: 100%; height: auto; max-height: 210px; display: block; }

    /* ── Question & options ── */
    .question-text { font-size: 1.1rem; font-weight: 600; line-height: 1.55; margin-bottom: 22px; color: #fff; }

    .options { display: flex; flex-direction: column; gap: 10px; }

    .option-btn {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      text-align: left;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .option-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(92,124,250,0.1); transform: translateX(2px); }

    .option-btn .letter {
      min-width: 26px; height: 26px; border-radius: 6px;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; font-weight: 700; color: var(--muted);
      transition: background 0.15s, color 0.15s; flex-shrink: 0;
    }
    .option-btn.correct { border-color: var(--green); background: var(--green-bg); }
    .option-btn.correct .letter { background: var(--green); color: #fff; }
    .option-btn.wrong   { border-color: var(--red);   background: var(--red-bg); }
    .option-btn.wrong   .letter { background: var(--red);   color: #fff; }
    .option-btn:disabled { cursor: default; }

    /* ── Explanation ── */
    .explanation {
      margin-top: 16px; padding: 14px 16px;
      background: var(--surface2);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      font-size: 0.88rem; color: var(--muted); line-height: 1.65;
      display: none; animation: fadeIn 0.2s ease;
    }
    .explanation.show { display: block; }
    .explanation strong { color: var(--text); }

    /* ── Next button ── */
    .next-btn {
      margin-top: 20px; width: 100%; padding: 14px;
      background: var(--accent); border: none; border-radius: 10px;
      color: #fff; font-size: 0.97rem; font-weight: 600;
      font-family: inherit; cursor: pointer;
      transition: background 0.15s, transform 0.1s; display: none;
    }
    .next-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .next-btn.show { display: block; }

    /* ── Result screen ── */
    #result-screen { max-width: 700px; width: 100%; display: none; animation: fadeIn 0.3s ease; }
    .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px 32px; text-align: center; }
    .result-emoji { font-size: 3.5rem; margin-bottom: 12px; }
    .result-title { font-size: 1.6rem; font-weight: 700; color: #fff; }
    .result-sub { color: var(--muted); margin-top: 6px; font-size: 0.95rem; }

    .score-circle {
      width: 120px; height: 120px; border-radius: 50%;
      border: 4px solid var(--accent);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      margin: 24px auto;
      background: rgba(92,124,250,0.08);
    }
    .score-number { font-size: 2rem; font-weight: 700; color: #fff; line-height: 1; }
    .score-total  { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }

    .result-feedback {
      background: var(--surface2); border-radius: 10px;
      padding: 14px 20px; color: var(--muted); font-size: 0.92rem;
      margin: 0 auto 24px; max-width: 440px; line-height: 1.6;
    }

    .cat-breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
    .cat-stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; text-align: left; }
    .cat-stat-name { font-size: 0.78rem; font-weight: 600; margin-bottom: 4px; }
    .cat-stat-bar-bg { height: 5px; background: var(--border); border-radius: 99px; margin: 6px 0 4px; }
    .cat-stat-bar-fill { height: 100%; border-radius: 99px; }
    .cat-stat-score { font-size: 0.78rem; color: var(--muted); }

    .result-btns { display: flex; flex-direction: column; gap: 10px; align-items: center; }
    .restart-btn {
      background: var(--accent); border: none; border-radius: 10px;
      padding: 13px 36px; color: #fff; font-size: 0.97rem; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: background 0.15s;
    }
    .restart-btn:hover { background: var(--accent-hover); }
    .home-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 14px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .home-link .arrow { color: var(--accent); }
    .home-link:active { background: var(--surface2); border-color: var(--accent); }

    /* ── Start screen ── */
    #start-screen { max-width: 700px; width: 100%; animation: fadeIn 0.3s ease; }
    .start-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 36px 32px; text-align: center; }
    .start-card h2 { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 10px; }
    .start-card p { color: var(--muted); font-size: 0.92rem; line-height: 1.6; margin-bottom: 24px; }

    .topics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; text-align: left; }
    .topic-item {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px; font-size: 0.84rem;
      display: flex; align-items: center; gap: 8px;
    }
    .topic-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── Score history (start screen) ── */
    .history-section {
      margin-bottom: 20px;
      text-align: left;
    }
    .history-section-title {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
      text-align: center;
    }
    .history-list { display: flex; flex-direction: column; gap: 6px; }
    .history-entry {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.84rem;
    }
    .history-entry-left { display: flex; align-items: center; gap: 8px; }
    .history-medal { font-size: 1rem; }
    .history-score { font-weight: 700; color: #fff; }
    .history-pct { font-size: 0.78rem; color: var(--muted); margin-left: 2px; }
    .history-date { font-size: 0.78rem; color: var(--muted); }

    .start-btns { display: flex; flex-direction: column; gap: 10px; align-items: center; }
    .start-btn {
      background: var(--accent); border: none; border-radius: 10px;
      padding: 14px 44px; color: #fff; font-size: 1rem; font-weight: 700;
      font-family: inherit; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .start-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .continue-btn {
      background: var(--surface2); border: 1.5px solid var(--accent); border-radius: 10px;
      padding: 13px 36px; color: var(--accent); font-size: 0.97rem; font-weight: 600;
      font-family: inherit; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .continue-btn:hover { background: rgba(92,124,250,0.15); transform: translateY(-1px); }

    /* ── Wrong answers review ── */
    .review-wrap {
      max-width: 700px;
      width: 100%;
      margin-top: 12px;
      animation: fadeIn 0.3s ease;
    }
    .review-toggle {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      width: 100%;
      text-align: left;
      cursor: pointer;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .review-toggle:hover { background: var(--surface2); }
    .review-toggle.open { border-color: var(--accent); }
    .review-toggle-left { display: flex; align-items: center; gap: 10px; }
    .review-toggle-count {
      font-size: 0.78rem; font-weight: 700;
      background: var(--red-bg); color: var(--red);
      border: 1px solid rgba(231,76,60,0.3);
      border-radius: 99px; padding: 2px 9px;
    }
    .review-toggle-arrow {
      color: var(--accent);
      font-size: 1.1rem;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .review-toggle.open .review-toggle-arrow { transform: rotate(90deg); }
    .review-list {
      margin-top: 8px;
      display: none;
      flex-direction: column;
      gap: 10px;
    }
    .review-list.open { display: flex; }
    .review-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      animation: fadeIn 0.2s ease;
    }
    .review-item-num {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .review-item-q {
      font-size: 0.93rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .review-answer-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 0.87rem;
      padding: 9px 12px;
      border-radius: 8px;
      margin-bottom: 6px;
      line-height: 1.45;
    }
    .review-answer-row.wrong-ans {
      background: var(--red-bg);
      border: 1px solid rgba(231,76,60,0.25);
    }
    .review-answer-row.correct-ans {
      background: var(--green-bg);
      border: 1px solid rgba(46,204,113,0.25);
    }
    .review-answer-icon { flex-shrink: 0; font-size: 0.9rem; margin-top: 1px; }
    .review-explain {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 0.84rem;
      color: var(--muted);
      line-height: 1.65;
    }
    .review-all-correct {
      background: var(--green-bg);
      border: 1px solid rgba(46,204,113,0.25);
      border-radius: 12px;
      padding: 16px 20px;
      text-align: center;
      color: var(--green);
      font-size: 0.93rem;
      font-weight: 600;
    }

    /* ── Loading / error ── */
    #loading { color: var(--muted); font-size: 0.95rem; margin-top: 80px; }

    @media (max-width: 500px) {
      .topics-grid, .cat-breakdown { grid-template-columns: 1fr; }
      .card, .result-card, .start-card { padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <a class="back-btn" href="./"><span class="arrow">←</span> Velg quiz</a>
    <div class="topbar-title" id="topbar-title">Quiz</div>
  </div>

  <div id="loading">Laster spørsmål…</div>

  <!-- START SCREEN -->
  <div id="start-screen" style="display:none;">
    <div class="start-card">
      <h2 id="start-title"></h2>
      <p id="start-desc"></p>
      <div class="topics-grid" id="topics-grid"></div>
      <div id="history-section" class="history-section" style="display:none;">
        <div class="history-section-title">Dine beste resultater</div>
        <div class="history-list" id="history-list"></div>
      </div>
      <div class="start-btns">
        <button class="continue-btn" id="continue-btn" style="display:none;" onclick="continueQuiz()"></button>
        <button class="start-btn" id="new-quiz-btn" onclick="startQuiz()">Start Quiz →</button>
      </div>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz-screen" style="display:none; width:100%; max-width:700px;">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="q-counter">Spørsmål 1</span>
        <span id="score-live">Poeng: 0</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
    </div>
    <div class="card" id="question-card">
      <span class="cat-badge" id="cat-badge">Kategori</span>
      <div class="q-image" id="q-image" style="display:none;"></div>
      <div class="question-text" id="question-text"></div>
      <div class="options" id="options-container"></div>
      <div class="explanation" id="explanation"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">Neste spørsmål →</button>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen">
    <div class="result-card">
      <div class="result-emoji" id="result-emoji">🎉</div>
      <div class="result-title" id="result-title">Bra jobbet!</div>
      <div class="result-sub"   id="result-sub">Her er resultatet ditt</div>
      <div class="score-circle">
        <div class="score-number" id="final-score">0</div>
        <div class="score-total"  id="final-total">av ?</div>
      </div>
      <div class="result-feedback" id="result-feedback"></div>
      <div class="cat-breakdown"   id="cat-breakdown"></div>
      <div class="result-btns">
        <button class="restart-btn" onclick="restartQuiz()">Ta quizen på nytt</button>
        <a class="home-link" href="./"><span class="arrow">←</span> Velg en annen quiz</a>
      </div>
    </div>
  </div>

  <!-- WRONG ANSWERS REVIEW -->
  <div id="review-wrap" class="review-wrap" style="display:none;">
    <button class="review-toggle" id="review-toggle" onclick="toggleReview()">
      <div class="review-toggle-left">
        <span id="review-toggle-label">Se feil svar</span>
        <span class="review-toggle-count" id="review-toggle-count"></span>
      </div>
      <span class="review-toggle-arrow">›</span>
    </button>
    <div class="review-list" id="review-list"></div>
  </div>

  <script>
    // ── Load question file based on ?tema= URL param ─────────────
    const tema = new URLSearchParams(location.search).get('tema') || '';
    if (!tema) { location.href = './'; }

    const script = document.createElement('script');
    script.src = `sporsmal-${tema}.js`;
    script.onerror = () => { document.getElementById('loading').textContent = 'Kunne ikke laste spørsmål.'; };
    script.onload  = initQuiz;
    document.head.appendChild(script);

    // ── State ────────────────────────────────────────────────────
    let questions    = [];
    let currentIdx   = 0;
    let score        = 0;
    let answered     = false;
    let catScores    = {};
    let wrongAnswers = [];   // { q, chosenText, correctText }

    // ── Storage keys ─────────────────────────────────────────────
    const PROGRESS_KEY = `quiz_progress_${tema}`;
    const HISTORY_KEY  = `quiz_history_${tema}`;

    // ── Progress helpers ─────────────────────────────────────────
    function saveProgress() {
      try {
        localStorage.setItem(PROGRESS_KEY, JSON.stringify({
          order: questions.map(q => QUESTIONS.indexOf(q)),
          idx: currentIdx,
          score,
          cats: catScores,
          wrongs: wrongAnswers.map(item => ({
            qIdx: QUESTIONS.indexOf(item.q),
            chosenText: item.chosenText,
            correctText: item.correctText
          }))
        }));
      } catch(e) {}
    }

    function clearProgress() {
      try { localStorage.removeItem(PROGRESS_KEY); } catch(e) {}
    }

    function getSavedProgress() {
      try { return JSON.parse(localStorage.getItem(PROGRESS_KEY)); }
      catch { return null; }
    }

    // ── History helpers ───────────────────────────────────────────
    function saveToHistory(sc, total) {
      const pct  = Math.round(sc / total * 100);
      const date = new Date().toLocaleDateString('no-NO', { day: 'numeric', month: 'short' });
      let hist   = getHistory();
      hist.push({ score: sc, total, pct, date });
      hist.sort((a, b) => b.pct - a.pct || b.score - a.score);
      hist = hist.slice(0, 3);
      try { localStorage.setItem(HISTORY_KEY, JSON.stringify(hist)); } catch(e) {}
    }

    function getHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
      catch { return []; }
    }

    function renderHistory() {
      const hist = getHistory();
      const section = document.getElementById('history-section');
      if (!hist.length) { section.style.display = 'none'; return; }
      const medals = ['🥇', '🥈', '🥉'];
      section.style.display = 'block';
      const list = document.getElementById('history-list');
      list.innerHTML = '';
      hist.forEach((entry, i) => {
        const div = document.createElement('div');
        div.className = 'history-entry';
        div.innerHTML =
          `<div class="history-entry-left">` +
            `<span class="history-medal">${medals[i]}</span>` +
            `<span class="history-score">${entry.score}/${entry.total}</span>` +
            `<span class="history-pct">${entry.pct}%</span>` +
          `</div>` +
          `<span class="history-date">${entry.date}</span>`;
        list.appendChild(div);
      });
    }

    // ── Wrong answers helpers ─────────────────────────────────────
    function renderWrongAnswers() {
      const wrap = document.getElementById('review-wrap');
      if (!wrongAnswers.length) {
        wrap.innerHTML =
          `<div class="review-all-correct">` +
            `✓ Perfekt! Du svarte riktig på alle spørsmålene.` +
          `</div>`;
        wrap.style.display = 'block';
        return;
      }
      wrap.style.display = 'block';
      document.getElementById('review-toggle-label').textContent =
        wrongAnswers.length === 1 ? 'Se 1 feil svar' : `Se ${wrongAnswers.length} feil svar`;
      document.getElementById('review-toggle-count').textContent =
        `${wrongAnswers.length}`;

      const list = document.getElementById('review-list');
      list.innerHTML = '';
      list.classList.remove('open');
      document.getElementById('review-toggle').classList.remove('open');

      wrongAnswers.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'review-item';
        div.innerHTML =
          `<div class="review-item-num">Feil ${i + 1} av ${wrongAnswers.length}</div>` +
          `<div class="review-item-q">${esc(item.q.q)}</div>` +
          `<div class="review-answer-row wrong-ans">` +
            `<span class="review-answer-icon">✗</span>` +
            `<span><strong>Ditt svar:</strong> ${esc(item.chosenText)}</span>` +
          `</div>` +
          `<div class="review-answer-row correct-ans">` +
            `<span class="review-answer-icon">✓</span>` +
            `<span><strong>Riktig svar:</strong> ${esc(item.correctText)}</span>` +
          `</div>` +
          `<div class="review-explain">${esc(item.q.explain)}</div>`;
        list.appendChild(div);
      });
    }

    function toggleReview() {
      const toggle = document.getElementById('review-toggle');
      const list   = document.getElementById('review-list');
      const open   = toggle.classList.toggle('open');
      list.classList.toggle('open', open);
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    const LETTERS = ['A', 'B', 'C', 'D'];

    // ── Init ─────────────────────────────────────────────────────
    function initQuiz() {
      document.getElementById('loading').style.display = 'none';

      document.getElementById('topbar-title').textContent = QUIZ_META.title;
      document.title = QUIZ_META.title + ' Quiz';

      document.getElementById('start-title').textContent = QUIZ_META.title;
      document.getElementById('start-desc').textContent  = QUIZ_META.description;

      const counts = {};
      QUESTIONS.forEach(q => { counts[q.cat] = (counts[q.cat] || 0) + 1; });

      const grid = document.getElementById('topics-grid');
      Object.entries(QUIZ_META.cats).forEach(([key, cat]) => {
        if (!counts[key]) return;
        const div = document.createElement('div');
        div.className = 'topic-item';
        div.innerHTML =
          `<span class="topic-dot" style="background:${cat.color}"></span>` +
          `${cat.label} (${counts[key]} spørsm.)`;
        grid.appendChild(div);
      });

      renderHistory();

      const saved = getSavedProgress();
      if (saved && saved.idx > 0 && saved.idx < saved.order.length) {
        const continueBtn = document.getElementById('continue-btn');
        continueBtn.textContent =
          `Fortsett fra spørsmål ${saved.idx + 1} av ${saved.order.length} (${saved.score} poeng) →`;
        continueBtn.style.display = 'block';
        document.getElementById('new-quiz-btn').textContent = 'Start på nytt';
      }

      document.getElementById('start-screen').style.display = 'block';
    }

    // ── Helpers ──────────────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ── Quiz flow ────────────────────────────────────────────────
    function startQuiz() {
      clearProgress();
      questions    = shuffle(QUESTIONS);
      currentIdx   = 0;
      score        = 0;
      answered     = false;
      wrongAnswers = [];
      catScores    = {};
      questions.forEach(q => {
        if (!catScores[q.cat]) catScores[q.cat] = { correct: 0, total: 0 };
        catScores[q.cat].total++;
      });

      document.getElementById('start-screen').style.display  = 'none';
      document.getElementById('quiz-screen').style.display   = 'block';
      document.getElementById('result-screen').style.display = 'none';
      hideReviewWrap();
      renderQuestion();
    }

    function continueQuiz() {
      const saved = getSavedProgress();
      if (!saved) { startQuiz(); return; }
      questions    = saved.order.map(i => QUESTIONS[i]);
      currentIdx   = saved.idx;
      score        = saved.score;
      catScores    = saved.cats;
      answered     = false;
      wrongAnswers = (saved.wrongs || []).map(item => ({
        q:           QUESTIONS[item.qIdx],
        chosenText:  item.chosenText,
        correctText: item.correctText
      }));

      document.getElementById('start-screen').style.display  = 'none';
      document.getElementById('quiz-screen').style.display   = 'block';
      document.getElementById('result-screen').style.display = 'none';
      hideReviewWrap();
      renderQuestion();
    }

    function hideReviewWrap() {
      const wrap = document.getElementById('review-wrap');
      wrap.style.display = 'none';
      wrap.innerHTML =
        `<button class="review-toggle" id="review-toggle" onclick="toggleReview()">` +
          `<div class="review-toggle-left">` +
            `<span id="review-toggle-label">Se feil svar</span>` +
            `<span class="review-toggle-count" id="review-toggle-count"></span>` +
          `</div>` +
          `<span class="review-toggle-arrow">›</span>` +
        `</button>` +
        `<div class="review-list" id="review-list"></div>`;
    }

    function renderQuestion() {
      const q = questions[currentIdx];
      answered = false;

      document.getElementById('q-counter').textContent  = `Spørsmål ${currentIdx + 1} av ${questions.length}`;
      document.getElementById('score-live').textContent = `Poeng: ${score}`;
      document.getElementById('progress-fill').style.width = (currentIdx / questions.length * 100) + '%';

      const cat   = QUIZ_META.cats[q.cat] || { label: q.catLabel || q.cat, color: 'var(--accent)' };
      const badge = document.getElementById('cat-badge');
      badge.textContent       = cat.label;
      badge.style.background  = cat.color + '26';
      badge.style.color       = cat.color;

      const imgDiv = document.getElementById('q-image');
      if (q.img) { imgDiv.innerHTML = q.img; imgDiv.style.display = 'block'; }
      else        { imgDiv.innerHTML = '';    imgDiv.style.display = 'none';  }

      document.getElementById('question-text').textContent = q.q;

      const expl = document.getElementById('explanation');
      expl.className = 'explanation';
      expl.innerHTML = '';

      const nextBtn = document.getElementById('next-btn');
      nextBtn.className   = 'next-btn';
      nextBtn.textContent = currentIdx === questions.length - 1 ? 'Se resultat →' : 'Neste spørsmål →';

      const indices      = shuffle([0, 1, 2, 3]);
      const shuffledOpts = indices.map(i => q.opts[i]);
      const correctIdx   = indices.indexOf(q.correct);

      const container = document.getElementById('options-container');
      container.innerHTML = '';
      shuffledOpts.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="letter">${LETTERS[i]}</span><span>${opt}</span>`;
        btn.addEventListener('click', () => selectAnswer(i, correctIdx, q, shuffledOpts));
        container.appendChild(btn);
      });
    }

    function selectAnswer(chosen, correctIdx, q, shuffledOpts) {
      if (answered) return;
      answered = true;

      document.querySelectorAll('.option-btn').forEach((btn, i) => {
        btn.disabled = true;
        if (i === correctIdx)  btn.classList.add('correct');
        else if (i === chosen) btn.classList.add('wrong');
      });

      if (chosen === correctIdx) {
        score++;
        catScores[q.cat].correct++;
      } else {
        wrongAnswers.push({
          q,
          chosenText:  shuffledOpts[chosen],
          correctText: shuffledOpts[correctIdx]
        });
      }

      document.getElementById('score-live').textContent = `Poeng: ${score}`;

      const expl = document.getElementById('explanation');
      expl.innerHTML = `<strong>${chosen === correctIdx ? '✓ Riktig!' : '✗ Feil.'}</strong> ${q.explain}`;
      expl.classList.add('show');
      document.getElementById('next-btn').classList.add('show');
    }

    function nextQuestion() {
      currentIdx++;
      if (currentIdx >= questions.length) {
        clearProgress();
        showResult();
      } else {
        saveProgress();
        renderQuestion();
      }
    }

    function showResult() {
      document.getElementById('quiz-screen').style.display   = 'none';
      document.getElementById('result-screen').style.display = 'block';

      saveToHistory(score, questions.length);
      renderHistory();

      const pct = Math.round((score / questions.length) * 100);
      let emoji, title, feedback;
      if      (pct >= 90) { emoji = '🏆'; title = 'Utmerket!';    feedback = 'Du behersker pensumet svært godt. Solid grunnlag foran eksamen!'; }
      else if (pct >= 75) { emoji = '🎉'; title = 'Bra jobbet!';   feedback = 'Du kan det meste. Gå gjennom kategoriene du bommet mest på for å tette hullene.'; }
      else if (pct >= 55) { emoji = '📚'; title = 'På rett vei!';  feedback = 'Greit resultat – men det er rom for forbedring. Fokuser på formler og definisjoner.'; }
      else                { emoji = '💪'; title = 'Hold ut!';       feedback = 'Ta en ny runde etter å ha lest gjennom teorien. Du er på vei!'; }

      document.getElementById('result-emoji').textContent    = emoji;
      document.getElementById('result-title').textContent    = title;
      document.getElementById('result-sub').textContent      = `${pct}% riktige svar`;
      document.getElementById('final-score').textContent     = score;
      document.getElementById('final-total').textContent     = `av ${questions.length}`;
      document.getElementById('result-feedback').textContent = feedback;

      const breakdown = document.getElementById('cat-breakdown');
      breakdown.innerHTML = '';
      Object.entries(catScores).forEach(([cat, data]) => {
        const meta = QUIZ_META.cats[cat];
        if (!meta) return;
        const p = data.total > 0 ? Math.round((data.correct / data.total) * 100) : 0;
        breakdown.innerHTML +=
          `<div class="cat-stat">` +
            `<div class="cat-stat-name" style="color:${meta.color}">${meta.label}</div>` +
            `<div class="cat-stat-bar-bg">` +
              `<div class="cat-stat-bar-fill" style="width:${p}%; background:${meta.color}"></div>` +
            `</div>` +
            `<div class="cat-stat-score">${data.correct} / ${data.total} (${p}%)</div>` +
          `</div>`;
      });

      renderWrongAnswers();
    }

    function restartQuiz() {
      clearProgress();
      hideReviewWrap();
      document.getElementById('result-screen').style.display = 'none';
      document.getElementById('continue-btn').style.display  = 'none';
      document.getElementById('new-quiz-btn').textContent    = 'Start Quiz →';
      renderHistory();
      document.getElementById('start-screen').style.display  = 'block';
    }
  </script>
</body>
</html>
