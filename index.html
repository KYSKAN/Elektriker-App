<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Elektriker">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d0f1a">
  <title>Elektriker-app</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f1a;
      --surface: #161927;
      --surface2: #1e2235;
      --border: #2a2f4a;
      --text: #e8eaf6;
      --muted: #7b82a8;
      --accent: #5c7cfa;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 32px 16px;
    }

    .logo {
      font-size: 52px;
      margin-bottom: 14px;
      filter: drop-shadow(0 0 20px rgba(92,124,250,0.45));
    }

    h1 {
      color: var(--text);
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 48px;
    }

    .nav-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 360px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
      animation: fadeIn 0.3s ease both;
    }

    .nav-btn:nth-child(2) { animation-delay: 0.06s; }
    .nav-btn:active { background: var(--surface2); border-color: var(--accent); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .nav-btn .icon {
      font-size: 26px;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      flex-shrink: 0;
    }

    .nav-btn .text { text-align: left; flex: 1; }
    .nav-btn .text strong {
      display: block;
      color: var(--text);
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 3px;
    }
    .nav-btn .text span {
      color: var(--muted);
      font-size: 12px;
    }
    .nav-btn .arrow {
      color: var(--accent);
      font-size: 20px;
    }

    #appVersion {
      position: fixed;
      bottom: 8px;
      right: 10px;
      font-size: 10px;
      color: #2a2f4a;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="logo">⚡</div>
  <h1>Elektriker-app</h1>
  <p class="subtitle">Verktøy for elektrikere</p>

  <div class="nav-grid">
    <a class="nav-btn" href="kalkulator/">
      <div class="icon">🧮</div>
      <div class="text">
        <strong>Kalkulatorer</strong>
        <span>Kabel, vern, Ohms lov, vekselspenning</span>
      </div>
      <div class="arrow">›</div>
    </a>

    <a class="nav-btn" href="quiz/">
      <div class="icon">📝</div>
      <div class="text">
        <strong>Quiz</strong>
        <span>Test kunnskapene dine</span>
      </div>
      <div class="arrow">›</div>
    </a>
  </div>

  <div id="appVersion"></div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js');
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    }
    if ('caches' in window) {
      caches.keys().then(keys => {
        const cache = keys.find(k => k.startsWith('kalkulator-'));
        if (cache) document.getElementById('appVersion').textContent = cache.replace('kalkulator-', '');
      });
    }
  </script>
</body>
</html>
